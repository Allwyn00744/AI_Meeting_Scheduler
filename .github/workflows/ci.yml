name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # CI-only placeholders. Never real credentials - external services
  # (Google OAuth, SMTP, Gemini) are never called by these checks.
  CI_DATABASE_URL: postgresql+psycopg2://ci_user:ci_password@localhost:5432/ci_db
  CI_SECRET_KEY: ci-placeholder-secret-key-not-for-production-use
  CI_EMAIL_HOST: smtp.example.invalid
  CI_EMAIL_USERNAME: ci-placeholder-username
  CI_EMAIL_PASSWORD: ci-placeholder-password
  CI_EMAIL_FROM: ci@example.invalid
  CI_GOOGLE_CLIENT_ID: ci-placeholder-client-id
  CI_GOOGLE_CLIENT_SECRET: ci-placeholder-client-secret
  CI_GOOGLE_REDIRECT_URI: http://localhost:8000/google/callback
  CI_FRONTEND_URL: http://localhost:5173
  CI_CORS_ORIGINS: http://localhost:3000
  CI_REDIS_URL: redis://localhost:6379/0

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: ci_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci_user -d ci_db"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=10s

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=5s

    env:
      DATABASE_URL: ${{ env.CI_DATABASE_URL }}
      SQLALCHEMY_ECHO: "false"
      EMAIL_HOST: ${{ env.CI_EMAIL_HOST }}
      EMAIL_PORT: "587"
      EMAIL_USERNAME: ${{ env.CI_EMAIL_USERNAME }}
      EMAIL_PASSWORD: ${{ env.CI_EMAIL_PASSWORD }}
      EMAIL_FROM: ${{ env.CI_EMAIL_FROM }}
      EMAIL_USE_SSL: "false"
      EMAIL_TIMEOUT_SECONDS: "10"
      GOOGLE_CLIENT_ID: ${{ env.CI_GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ env.CI_GOOGLE_CLIENT_SECRET }}
      GOOGLE_REDIRECT_URI: ${{ env.CI_GOOGLE_REDIRECT_URI }}
      FRONTEND_URL: ${{ env.CI_FRONTEND_URL }}
      SECRET_KEY: ${{ env.CI_SECRET_KEY }}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      CORS_ORIGINS: ${{ env.CI_CORS_ORIGINS }}
      DEFAULT_PAGE_SIZE: "50"
      MAX_PAGE_SIZE: "200"
      REDIS_URL: ${{ env.CI_REDIS_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Verify exactly one Alembic head
        working-directory: backend
        run: |
          HEADS_OUTPUT=$(alembic heads)
          echo "$HEADS_OUTPUT"
          HEAD_COUNT=$(echo "$HEADS_OUTPUT" | grep -c '(head)')
          if [ "$HEAD_COUNT" -ne 1 ]; then
            echo "Expected exactly one Alembic head, found $HEAD_COUNT"
            exit 1
          fi

      - name: Run Alembic migrations against PostgreSQL
        working-directory: backend
        run: alembic upgrade head

      - name: Python compile check
        working-directory: backend
        run: python -m compileall app

      - name: Import FastAPI application
        working-directory: backend
        run: python -c "from app.main import app; print('FastAPI app import OK')"

      - name: Run backend tests
        working-directory: backend
        run: python -m unittest tests.test_redis_cache -v

      - name: Redis service smoke test
        working-directory: backend
        run: |
          python -c "
          import redis
          client = redis.Redis.from_url('${{ env.CI_REDIS_URL }}', protocol=2)
          assert client.ping() is True
          client.set('ci-smoke-check', 'ok')
          assert client.get('ci-smoke-check') == b'ok'
          client.delete('ci-smoke-check')
          print('Redis service smoke test OK')
          "

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
        run: npm run build

      - name: TypeScript project check
        working-directory: frontend
        run: npx tsc -b --force

  docker-validate:
    name: Docker Compose Config
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write CI-only placeholder backend/.env
        run: |
          cat > backend/.env <<'EOF'
          DATABASE_URL=postgresql+psycopg2://ci_user:ci_password@postgres:5432/ci_db
          EMAIL_HOST=smtp.example.invalid
          EMAIL_PORT=587
          EMAIL_USERNAME=ci-placeholder-username
          EMAIL_PASSWORD=ci-placeholder-password
          EMAIL_FROM=ci@example.invalid
          GOOGLE_CLIENT_ID=ci-placeholder-client-id
          GOOGLE_CLIENT_SECRET=ci-placeholder-client-secret
          GOOGLE_REDIRECT_URI=http://localhost:8000/google/callback
          FRONTEND_URL=http://localhost:5173
          SECRET_KEY=ci-placeholder-secret-key-not-for-production-use
          CORS_ORIGINS=http://localhost:3000
          EOF

      - name: Validate docker compose config
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: ci_db
          POSTGRES_PORT: "5432"
          BACKEND_PORT: "8000"
          FRONTEND_PORT: "5173"
          CORS_ORIGINS: http://localhost:5173,http://localhost:3000
          FRONTEND_URL: http://localhost:5173
          VITE_API_URL: http://localhost:8000
        run: docker compose config
